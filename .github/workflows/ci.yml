name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

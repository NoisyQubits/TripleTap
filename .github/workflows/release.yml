name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Package binary
        run: |
          tar -czf "tripletap-${{ github.ref_name }}-macos-arm64.tar.gz" \
            -C .build/release tripletap

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "tripletap-${{ github.ref_name }}-macos-arm64.tar.gz" \
            --title "${{ github.ref_name }}" \
            --generate-notes
